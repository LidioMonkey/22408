<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>408 知识点复习</title>
    <style>
        :root{--sidebar-width:260px;--primary:#d9730d;--primary-light:rgba(217,115,13,0.08);--bg:#f7f6f3;--text:#37352f;--text-secondary:#9b9a97;--border:rgba(55,53,47,0.09);--header-height:52px}
        *{margin:0;padding:0;box-sizing:border-box}
        body,html{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
        
        /* ===== Unified Header ===== */
        .header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-height);background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);color:var(--text);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border)}
        .header h1{font-size:16px;font-weight:700;letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .header .subtitle{font-size:11px;color:var(--text-secondary);margin-left:12px}
        .menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;margin-right:12px;padding:4px;border-radius:6px;line-height:1;flex-shrink:0}
        .back-link{color:var(--text-secondary);text-decoration:none;font-size:13px;font-weight:500;display:flex;align-items:center;gap:4px;margin-right:12px;flex-shrink:0}
        .back-link:hover{color:var(--primary)}
        
        /* ===== Sidebar ===== */
        .sidebar{position:fixed;top:var(--header-height);left:0;bottom:0;width:var(--sidebar-width);background:#fff;border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding:12px 0;transition:transform .3s cubic-bezier(0.16,1,0.3,1)}
        .sidebar::-webkit-scrollbar{width:4px}
        .sidebar::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:4px}
        .sidebar-section{padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
        .sidebar-section:last-child{border-bottom:none}
        .sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--primary);font-weight:800;padding:0 18px;margin-bottom:6px}
        .sidebar .pill{display:block;margin:4px 12px;width:calc(100% - 24px);text-align:left;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text-secondary);transition:.2s}
        .sidebar .pill .icon-svg{width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;flex-shrink:0}
        .sidebar .pill:hover{background:rgba(192,57,43,0.04);color:var(--primary)}
        .sidebar .pill.active{background:var(--primary-light);color:var(--primary);border-color:rgba(192,57,43,0.15);font-weight:600}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99}
        .sidebar-overlay.show{display:block}
        #content{margin-left:var(--sidebar-width);height:100%;overflow-y:auto;padding:var(--header-height) 40px 32px;scroll-behavior:smooth}
        .slide-card{background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:12px;padding:28px 32px;margin-bottom:24px}
        .slide-card h2{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid rgba(192,57,43,0.1)}
        .slide-card h3{font-size:17px;font-weight:600;margin:16px 0 8px;color:#1d1d1f}
        .slide-card h4{font-size:15px;font-weight:600;margin:12px 0 6px;color:#333}
        .slide-card p{font-size:14px;line-height:1.8;margin-bottom:8px;color:#444}
        .slide-card ul,.slide-card ol{font-size:14px;line-height:1.8;margin:8px 0 8px 20px;color:#444}
        .slide-card li{margin-bottom:4px}
        .slide-card code{font-family:"SF Mono",Consolas,monospace;background:rgba(0,0,0,0.04);padding:2px 6px;border-radius:4px;font-size:13px;color:#c0392b}
        .slide-card pre{background:#1e1e2e;color:#cdd6f4;padding:16px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.6;margin:12px 0;font-family:"SF Mono",Consolas,monospace}
        .slide-card pre code{background:none;padding:0;color:inherit}
        .slide-card table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
        .slide-card th,.slide-card td{border:1px solid rgba(0,0,0,0.08);padding:8px 12px;text-align:left}
        .slide-card th{background:rgba(192,57,43,0.04);font-weight:600;color:var(--primary)}
        .slide-card .grid{display:grid;gap:16px;margin:12px 0}
        .slide-card .grid.g2{grid-template-columns:1fr 1fr}
        .slide-card .grid.g3{grid-template-columns:1fr 1fr 1fr}
        .slide-card .card{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:8px;padding:16px}
        .slide-card .card-accent{border-left:3px solid var(--primary)}
        .slide-card .cmp{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0}
        .slide-card .cmp .pro{border-left:3px solid #27ae60}
        .slide-card .cmp .con{border-left:3px solid #e74c3c}
        .slide-card .c-h{font-size:13px;font-weight:600;margin-bottom:8px;color:#555}
        .slide-card .viz{font-family:"SF Mono",Consolas,monospace;background:#1e1e2e;color:#cdd6f4;padding:12px;border-radius:6px;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre}
        .slide-card .viz code{white-space:pre}
        @media(max-width:480px){.slide-card .viz{font-size:11px;padding:8px}}
        .slide-card .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(192,57,43,0.06);color:var(--primary);font-weight:500;margin:2px}
        .slide-card .bigo{display:inline-block;font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px;margin:2px}
        .slide-card .o-1{background:#d4edda;color:#155724}
        .slide-card .o-logn{background:#cce5ff;color:#004085}
        .slide-card .o-n{background:#fff3cd;color:#856404}
        .slide-card .o-nlogn{background:#ffeaa7;color:#6c5ce7}
        .slide-card .o-n2{background:#f8d7da;color:#721c24}
        .slide-card .kicker{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--primary);font-weight:700;margin-bottom:4px}
        .slide-card .lede{font-size:15px;color:#666;line-height:1.6}
        .slide-card .dim{color:#888}
        .slide-card .mono{font-family:"SF Mono",Consolas,monospace}
        /* ===== KP Cards (structured knowledge points) ===== */
        .kp-card .kp-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
        .kp-tag{font-size:11px;padding:2px 10px;border-radius:10px;background:rgba(192,57,43,0.06);color:var(--primary);font-weight:500}
        .kp-section{margin:14px 0;padding:14px 16px;border-radius:10px;background:rgba(0,0,0,0.01);border:1px solid rgba(0,0,0,0.04)}
        .kp-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--primary);font-weight:700;margin-bottom:8px}
        .kp-definition{border-left:4px solid var(--primary);background:rgba(192,57,43,0.02)}
        .kp-keypoints ul{padding-left:20px;font-size:14px;line-height:2;color:#444}
        .kp-keypoints li{margin-bottom:2px}
        .kp-code{background:#1e1e2e;color:#cdd6f4;padding:16px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.6;font-family:"SF Mono",Consolas,monospace;white-space:pre-wrap}
        .kp-table{width:100%;border-collapse:collapse;font-size:13px}
        .kp-table th,.kp-table td{border:1px solid rgba(0,0,0,0.08);padding:8px 12px;text-align:left}
        .kp-table th{background:rgba(192,57,43,0.04);color:var(--primary);font-weight:600}
        .kp-tip,.kp-pitfall,.kp-memory,.kp-note{display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.7;padding:12px 16px}
        .kp-tip{background:rgba(211,84,0,0.04);border:1px solid rgba(211,84,0,0.12);border-radius:10px;color:#555}
        .kp-pitfall{background:rgba(192,57,43,0.04);border:1px solid rgba(192,57,43,0.12);border-radius:10px;color:#555}
        .kp-memory{background:rgba(124,58,237,0.04);border:1px solid rgba(124,58,237,0.12);border-radius:10px;color:#555}
        .kp-note{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:10px;color:#888;font-size:13px}
        .tip-icon{font-size:16px;flex-shrink:0;line-height:1.5}
        .kp-example{border-left:4px solid #27ae60;background:rgba(39,174,96,0.02)}
        .kp-example-q{font-size:14px;line-height:1.8;margin-bottom:8px}
        .kp-example-a{cursor:pointer;font-size:14px}
        .kp-answer-hidden{color:#27ae60;font-weight:600}
        .kp-answer-text{display:none}
        .kp-example-a.show .kp-answer-hidden{display:none}
        .kp-example-a.show .kp-answer-text{display:inline;color:#27ae60;font-weight:600}
        .kp-example-s{font-size:13px;color:#666;margin-top:8px;padding:10px;background:rgba(0,0,0,0.02);border-radius:6px;white-space:pre-wrap;font-family:"SF Mono",Consolas,monospace}
        .kp-formula{text-align:center;font-size:18px;padding:20px;background:rgba(192,57,43,0.02);border-radius:10px}
        .kp-timeline{padding:10px 0}
        .tl-step{display:flex;align-items:center;gap:12px;margin:8px 0}
        .tl-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0}
        .tl-line{width:2px;height:16px;background:rgba(192,57,43,0.15);margin-left:4px}
        .tl-text{font-size:14px;color:#444}
        .kp-related{margin-top:20px;padding:14px 16px;background:rgba(0,0,0,0.02);border-radius:10px;border:1px dashed rgba(0,0,0,0.08)}
        .kp-related-title{font-size:12px;color:#999;margin-bottom:8px}
        .kp-related-list{display:flex;gap:6px;flex-wrap:wrap}
        .kp-related-list .pill{font-size:12px;padding:4px 12px;border:1px solid rgba(0,0,0,0.08);border-radius:16px;cursor:pointer;color:var(--text-secondary);transition:.2s}
        .kp-related-list .pill:hover{background:var(--primary-light);color:var(--primary);border-color:rgba(192,57,43,0.2)}
        .empty{text-align:center;padding:60px 20px;color:#999;font-size:15px}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);width:280px}
            .sidebar.open{transform:translateX(0)}
            .sidebar .pill{font-size:14px;padding:8px 14px}
            .menu-toggle{display:block}
            #content{margin-left:0;padding:56px 16px 24px}
            .slide-card{padding:20px}
            .slide-card .grid.g2,.slide-card .grid.g3,.slide-card .cmp{grid-template-columns:1fr}
            .header h1{font-size:14px}
            .back-link{font-size:12px;margin-right:8px}
        }
    </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<header class="header">
  <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
  <a href="index.html" class="back-link">← 返回</a>
  <h1><svg class="icon-svg" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1h8v12H3z"/><path d="M3 1L7 4l4-3"/></svg> 408 知识点复习</h1>
</header>
<div class="sidebar" id="sidebar">
    <div class="sidebar-section" id="subject-section">
        <div class="sidebar-title">科目</div>
        <div class="pill active" data-subject="data-structure" onclick="setSubject('data-structure')"><svg class="icon-svg" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1h8v12H3z"/><path d="M3 1L7 4l4-3"/></svg> 数据结构 <span style="font-size:11px;color:#999">45分</span></div>
        <div class="pill" data-subject="computer-organization" onclick="setSubject('computer-organization')"><svg class="icon-svg" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 2.5l-6 6"/><circle cx="10.5" cy="2.5" r="2"/><path d="M6.5 6.5l-3 3a2 2 0 102.8 2.8l3-3"/></svg> 计算机组成原理 <span style="font-size:11px;color:#999">45分</span></div>
        <div class="pill" data-subject="operating-system" onclick="setSubject('operating-system')"><svg class="icon-svg" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="2.5"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M3 3l1 1M10 10l1 1M3 11l1-1M10 4l1-1"/></svg> 操作系统 <span style="font-size:11px;color:#999">35分</span></div>
        <div class="pill" data-subject="computer-network" onclick="setSubject('computer-network')"><svg class="icon-svg" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="6"/><ellipse cx="7" cy="7" rx="3" ry="6"/><line x1="1" y1="7" x2="13" y2="7"/></svg> 计算机网络 <span style="font-size:11px;color:#999">25分</span></div>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-title">章节</div>
        <div id="chapter-list"></div>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-title">模式</div>
        <div class="pill active" id="mode-slides" onclick="setMode('slides')">📽️ 幻灯片</div>
        <div class="pill" id="mode-kp" onclick="setMode('kp')">📚 知识点</div>
    </div>
</div>
<div id="content">
    <div id="slides"></div>
</div>
<script src="review_data.js"></script>
<script src="../renderer/kp-card.js"></script>
<script src="../data/408/kp/ds-intro-complexity.js"></script>
<script src="../data/408/kp/ds-linear-sequence.js"></script>
<script src="../data/408/kp/ds-linear-linkedlist.js"></script>
<script src="../data/408/kp/co-cache-memory.js"></script>
<script src="../data/408/kp/co-pipeline.js"></script>
<script src="../data/408/kp/os-process-sync.js"></script>
<script src="../data/408/kp/os-memory-page.js"></script>
<script src="../data/408/kp/cn-tcpip-stack.js"></script>
<script src="../data/408/kp/cn-network-ip.js"></script>
<script>
let currentSubject = 'data-structure';
let currentMode = 'slides'; // 'slides' or 'kp'

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    const tg = document.getElementById('menu-toggle');
    sb.classList.toggle('open');
    ov.classList.toggle('show');
    tg.innerHTML = sb.classList.contains('open') ? '&#10005;' : '&#9776;';
}

function setSubject(subject) {
    currentSubject = subject;
    document.querySelectorAll('#subject-section .pill').forEach(p => {
        p.classList.toggle('active', p.dataset.subject === subject);
    });
    renderChapters();
    renderContent();
    document.getElementById('content').scrollTop = 0;
    if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
    }
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-slides').classList.toggle('active', mode === 'slides');
    document.getElementById('mode-kp').classList.toggle('active', mode === 'kp');
    renderChapters();
    renderContent();
    document.getElementById('content').scrollTop = 0;
}

function renderChapters() {
    const list = document.getElementById('chapter-list');
    if (currentMode === 'slides') {
        const data = REVIEW_DATA[currentSubject];
        if (!data) { list.innerHTML = ''; return; }
        list.innerHTML = data.slides.map((s, i) =>
            `<div class="pill" data-index="${i}" onclick="scrollToSlide(${i})">${s.title}</div>`
        ).join('');
    } else {
        // KP mode: show chapter groups
        const kps = getKPsForSubject(currentSubject);
        const chapters = [...new Set(kps.map(kp => kp.chapter))];
        list.innerHTML = chapters.map((ch, i) =>
            `<div class="pill" data-chapter="${ch}" onclick="scrollToKPChapter('${ch}')">${ch}</div>`
        ).join('');
    }
}

function scrollToSlide(index) {
    const el = document.getElementById('slide-' + index);
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.querySelectorAll('#chapter-list .pill').forEach(p => {
            p.classList.toggle('active', parseInt(p.dataset.index) === index);
        });
    }
}

function scrollToKPChapter(chapter) {
    const el = document.querySelector(`[data-chapter="${chapter}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // 高亮第一个找到的该章节知识点
    const kp = document.querySelector(`[data-kp-chapter="${chapter}"]`);
    if (kp) kp.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderContent() {
    if (currentMode === 'slides') {
        renderSlides();
    } else {
        renderKPs();
    }
}

function renderSlides() {
    const data = REVIEW_DATA[currentSubject];
    const container = document.getElementById('slides');
    if (!data || !data.slides.length) {
        container.innerHTML = '<div class="empty">暂无数据</div>';
        return;
    }
    container.innerHTML = data.slides.map((s, i) =>
        `<div class="slide-card" id="slide-${i}">
            <div class="kicker">${data.title}</div>
            <h2>${s.title}</h2>
            ${s.content}
        </div>`
    ).join('');
}

function renderKPs() {
    const container = document.getElementById('slides');
    const kps = getKPsForSubject(currentSubject);
    if (!kps.length) {
        container.innerHTML = '<div class="empty">暂无知识点数据。在 data/408/kp/ 下添加 .js 文件即可。</div>';
        return;
    }
    container.innerHTML = kps.map(kp =>
        `<div class="slide-card kp-card" data-kp-chapter="${kp.chapter}" id="kp-${kp.id}">
            <div class="kicker">${kp.subject} · ${kp.chapter}</div>
            <h2>${kp.title}</h2>
            ${kp.tags ? `<div class="kp-tags">${kp.tags.map(t => `<span class="kp-tag">${t}</span>`).join('')}</div>` : ''}
            ${renderKPSections(kp.sections)}
            ${kp.related && kp.related.length ? `
                <div class="kp-related">
                    <div class="kp-related-title">🔗 关联知识点</div>
                    <div class="kp-related-list">${kp.related.map(id => `<span class="pill" onclick="scrollToKP('${id}')">${getKPTitle(id) || id}</span>`).join('')}</div>
                </div>
            ` : ''}
        </div>`
    ).join('');
    // 重新渲染 MathJax
    if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise();
    }
}

function getKPsForSubject(subject) {
    const all = [
      KP_DS_INTRO_COMPLEXITY, KP_DS_LINEAR_SEQUENCE, KP_DS_LINEAR_LINKEDLIST,
      KP_CO_CACHE, KP_CO_PIPELINE,
      KP_OS_PROCESS, KP_OS_MEMORY,
      KP_CN_TCPIP, KP_CN_NETWORK
    ];
    return all.filter(kp => kp.subject === subject);
}

function getKPTitle(id) {
    const all = [
      KP_DS_INTRO_COMPLEXITY, KP_DS_LINEAR_SEQUENCE, KP_DS_LINEAR_LINKEDLIST,
      KP_CO_CACHE, KP_CO_PIPELINE,
      KP_OS_PROCESS, KP_OS_MEMORY,
      KP_CN_TCPIP, KP_CN_NETWORK
    ];
    const found = all.find(kp => kp.id === id);
    return found ? found.title : null;
}

function scrollToKP(id) {
    const el = document.getElementById('kp-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Highlight current chapter on scroll
document.getElementById('content').addEventListener('scroll', function() {
    const cards = document.querySelectorAll('.slide-card');
    const pills = document.querySelectorAll('#chapter-list .pill');
    let current = 0;
    cards.forEach((card, i) => {
        if (card.getBoundingClientRect().top < 200) current = i;
    });
    pills.forEach((p, i) => {
        p.classList.toggle('active', i === current);
    });
});

// Init
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
    }
});

setSubject('data-structure');
</script>
</body>
</html>
